services:
  postgres:
    image: postgres:16-alpine
    container_name: weaponshop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: weaponshop
      POSTGRES_USER: weaponshop
      POSTGRES_PASSWORD: weaponshop_dev_password
    ports:
      - "5432:5432"
    volumes:
      - weaponshop_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weaponshop -d weaponshop"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  weaponshop_postgres_data:
